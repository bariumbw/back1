<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; border: 1px solid #ccc; }
        button { padding: 12px 24px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <button class="tab-btn active" id="btnReg" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" id="btnUse" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <input type="number" id="start" placeholder="起始編號" oninput="calcTotal('start', 'end', 'totalDisplay')">
        <input type="number" id="end" placeholder="結束編號" oninput="calcTotal('start', 'end', 'totalDisplay')">
        <h3 id="totalDisplay">總張數: 0</h3>
        <h3 id="batchDisplay">本次批次: 讀取中...</h3>
        <button id="regBtn" onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <input type="number" id="useStart" placeholder="起始編號" oninput="handleUseInput()">
        <input type="number" id="useEnd" placeholder="結束編號" oninput="calcTotal('useStart', 'useEnd', 'useTotalDisplay')">
        <h3 id="useInfoDisplay">偵測中：請輸入起始編號...</h3>
        <h3 id="useTotalDisplay">總張數: 0</h3>
        <input type="text" id="orderNo" placeholder="請填寫單號 (Order No.)">
        <button id="useBtn" onclick="useGift()" disabled>確認批量使用</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxx9WbFMkPFWESULzSs0y8AZfCR0zEKi-uk4F7Mjmw6iXU92ooEOR107fsAAJGTcEUy/exec";
        let configData, currentBatch, foundData;

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
        }

        window.onload = async () => {
            const res = await fetch(API_URL);
            const result = await res.json();
            configData = result.config;
            currentBatch = result.batch;
            document.getElementById('batchDisplay').innerText = "本次批次: " + currentBatch;
            const sSelect = document.getElementById('supplierSelect');
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.text = s;
                sSelect.appendChild(opt);
            });
            updateGiftMenu();
        };

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value;
            const g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => {
                let opt = document.createElement('option');
                opt.value = r[1]; opt.text = r[1];
                g.appendChild(opt);
            });
        }

        function calcTotal(sId, eId, dId) {
            const s = parseInt(document.getElementById(sId).value);
            const e = parseInt(document.getElementById(eId).value);
            document.getElementById(dId).innerText = "總張數: " + (e - s + 1 || 0);
        }

        async function register() {
            const start = parseInt(document.getElementById('start').value);
            const end = parseInt(document.getElementById('end').value);
            const s = document.getElementById('supplierSelect').value;
            const g = document.getElementById('giftSelect').value;
            
            const checkRes = await fetch(`${API_URL}?action=check&supplier=${encodeURIComponent(s)}&gift=${encodeURIComponent(g)}`);
            if ((await checkRes.json()).some(c => c >= start && c <= end)) { alert("編號範圍內有重複！"); return; }

            document.getElementById('regBtn').disabled = true;
            let payload = [];
            for(let i = start; i <= end; i++) payload.push({Batch: currentBatch, Supplier: s, GiftName: g, Code: i});
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'register', payload: payload}) });
            alert("登記完成！"); location.reload();
        }

        async function handleUseInput() {
            calcTotal('useStart', 'useEnd', 'useTotalDisplay');
            const code = document.getElementById('useStart').value;
            if(!code) return;
            const res = await fetch(`${API_URL}?action=find&code=${code}`);
            foundData = await res.json();
            if(foundData.found) {
                document.getElementById('useInfoDisplay').innerText = `偵測到：${foundData.supplier} - ${foundData.gift} (狀態: ${foundData.status})`;
                document.getElementById('useBtn').disabled = (foundData.status !== '未使用');
            } else {
                document.getElementById('useInfoDisplay').innerText = "找不到該起始編號";
                document.getElementById('useBtn').disabled = true;
            }
        }

        async function useGift() {
            const start = parseInt(document.getElementById('useStart').value);
            const end = parseInt(document.getElementById('useEnd').value);
            const orderNo = document.getElementById('orderNo').value;
            if(!orderNo) { alert("請填寫單號！"); return; }

            document.getElementById('useBtn').disabled = true;
            for(let i = start; i <= end; i++) {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Code: i, OrderNo: orderNo, Supplier: foundData.supplier, GiftName: foundData.gift}) });
            }
            alert("批量更新完成！"); location.reload();
        }
    </script>
</body>
</html>

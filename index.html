<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; }
        .active { background: #4CAF50; color: white; }
        .content { display: none; }
        .content.active { display: block; }
        input, select { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <button class="tab-btn active" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <input type="number" id="start" placeholder="起始編號" oninput="calcTotal('start', 'end', 'totalDisplay')">
        <input type="number" id="end" placeholder="結束編號" oninput="calcTotal('start', 'end', 'totalDisplay')">
        <h3 id="totalDisplay">總張數: 0</h3>
        <button id="regBtn" onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <input type="number" id="useStart" placeholder="起始編號" oninput="handleUseInput()">
        <input type="number" id="useEnd" placeholder="結束編號" oninput="calcTotal('useStart', 'useEnd', 'useTotalDisplay')">
        <h3 id="useInfoDisplay">請輸入起始編號...</h3>
        <h3 id="useTotalDisplay">總張數: 0</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift()" disabled>確認批量使用</button>
    </div>

    <script>
        const API_URL = "填入您的 API 網址";
        let configData, currentBatch, foundData;

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = async () => {
            const res = await fetch(API_URL);
            const result = await res.json();
            configData = result.config;
            currentBatch = result.batch;
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
        };

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value;
            const g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => {
                let opt = document.createElement('option');
                opt.value = r[1]; opt.text = r[1];
                g.appendChild(opt);
            });
        }

        function calcTotal(s, e, d) {
            document.getElementById(d).innerText = "總張數: " + (parseInt(document.getElementById(e).value) - parseInt(document.getElementById(s).value) + 1 || 0);
        }

        async function register() {
            const start = parseInt(document.getElementById('start').value);
            const end = parseInt(document.getElementById('end').value);
            const s = document.getElementById('supplierSelect').value;
            const g = document.getElementById('giftSelect').value;
            let payload = [];
            for(let i = start; i <= end; i++) payload.push({Batch: currentBatch, Supplier: s, GiftName: g, Code: i});
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'register', payload: payload}) });
            alert("登記完成！"); location.reload();
        }

        async function handleUseInput() {
            calcTotal('useStart', 'useEnd', 'useTotalDisplay');
            const res = await fetch(`${API_URL}?action=find&code=${document.getElementById('useStart').value}`);
            foundData = await res.json();
            document.getElementById('useInfoDisplay').innerText = foundData.found ? `偵測到：${foundData.supplier} - ${foundData.gift} (狀態: ${foundData.status})` : "找不到該編號";
            document.getElementById('useBtn').disabled = !foundData.found;
        }

        async function useGift() {
            const start = parseInt(document.getElementById('useStart').value);
            const end = parseInt(document.getElementById('useEnd').value);
            let dups = [];
            for(let i = start; i <= end; i++) {
                let res = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Code: i, Supplier: foundData.supplier, GiftName: foundData.gift}) })).json();
                if(res.result === 'duplicate') dups.push(i);
            }
            if(dups.length > 0 && !confirm("以下號碼已使用，是否覆蓋並寫入時間2？\n" + dups.join(", "))) return;
            for(let i = start; i <= end; i++) {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Code: i, OrderNo: document.getElementById('orderNo').value, Supplier: foundData.supplier, GiftName: foundData.gift, forceOverwrite: true}) });
            }
            alert("處理完成！"); location.reload();
        }
    </script>
</body>
</html>

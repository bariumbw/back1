<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select, textarea { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <button class="tab-btn active" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記 (Batch: <span id="batchDisplay">讀取中...</span>)</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <select id="regMode" onchange="toggleMode('reg', this.value)">
            <option value="list">輸入清單</option>
            <option value="range" selected>首尾碼範圍</option>
        </select>
        <div id="regList" style="display:none;"><textarea id="regCodes" oninput="calcTotal('regCodes', 'regTotal')"></textarea></div>
        <div id="regRange">
            <input type="number" id="regStart" placeholder="起始" oninput="calcTotalRange('reg')">
            <input type="number" id="regEnd" placeholder="結束" oninput="calcTotalRange('reg')">
        </div>
        <h3 id="regTotal">總張數: 0</h3>
        <button id="regBtn" onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <select id="useMode" onchange="toggleMode('use', this.value)">
            <option value="list">輸入清單</option>
            <option value="range" selected>首尾碼範圍</option>
        </select>
        <div id="useList" style="display:none;"><textarea id="useCodes" oninput="handleSingleCheck(this.value); calcTotal('useCodes', 'useTotal')"></textarea></div>
        <div id="useRange">
            <input type="number" id="useStart" placeholder="起始" oninput="handleSingleCheck(this.value); calcTotalRange('use')">
            <input type="number" id="useEnd" placeholder="結束" oninput="handleSingleCheck(this.value); calcTotalRange('use')">
        </div>
        <h3 id="useTotal">總張數: 0</h3>
        <h3 id="useInfoDisplay">請輸入編號...</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift(false)" disabled>確認批量使用</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz8jMVaJLH03E9ORniS8xEY_q_kJDq5mYbJ1H-XbKhclJphSfCn48IGBZDIybM9q-heVw/exec";
        let configData, currentBatch;

        window.onload = async () => {
            const res = await (await fetch(API_URL)).json();
            configData = res.config;
            currentBatch = await (await fetch(API_URL + "?action=getBatch")).text();
            document.getElementById('batchDisplay').innerText = currentBatch;
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option'); opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
        };

        function toggleMode(p, m) {
            document.getElementById(p + 'List').style.display = (m === 'list') ? 'block' : 'none';
            document.getElementById(p + 'Range').style.display = (m === 'range') ? 'block' : 'none';
        }

        function applySuffix(val, type) {
            if (!type) return val;
            let s = val.toString();
            if (type === "suffix_12") return s.slice(-12);
            if (type === "suffix_1") return s.slice(0, -1);
            if (type === "suffix_2") return s.slice(0, -2);
            return s;
        }

        function calcTotal(id, target) {
            const val = document.getElementById(id).value.trim().split('\n').filter(Boolean);
            document.getElementById(target).innerText = "總張數: " + val.length;
        }

        function calcTotalRange(p) {
            const s = document.getElementById(p + 'Start').value;
            const e = document.getElementById(p + 'End').value;
            if(!s || !e) return;
            const type = (window.foundData && window.foundData.calcType) ? window.foundData.calcType : null;
            const startProcessed = parseInt(applySuffix(s, type));
            const endProcessed = parseInt(applySuffix(e, type));
            const count = (endProcessed >= startProcessed) ? (endProcessed - startProcessed + 1) : 0;
            document.getElementById(p + 'Total').innerText = "總張數: " + count;
        }

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => { let opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); });
        }

        async function register() {
            document.getElementById('regBtn').innerText = "處理中...";
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value;
            let codes = (document.getElementById('regMode').value === 'list') ? document.getElementById('regCodes').value.trim().split('\n') : Array.from({length: parseInt(document.getElementById('regEnd').value) - parseInt(document.getElementById('regStart').value) + 1}, (_, i) => (parseInt(document.getElementById('regStart').value) + i).toString());
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'register', payload: codes.map(c => ({Batch: currentBatch, Supplier: s, GiftName: g, Code: c}))}) });
            alert("登記完成！"); location.reload();
        }

        async function handleSingleCheck(val) {
            const code = (document.getElementById('useMode').value === 'list') ? val.trim().split('\n')[0] : document.getElementById('useStart').value;
            if(!code) return;
            const res = await (await fetch(`${API_URL}?action=find&code=${code}`)).json();
            window.foundData = res;
            document.getElementById('useInfoDisplay').innerText = res.found ? `偵測到：${res.supplier} - ${res.gift} (狀態: ${res.used})` : "找不到該編號";
            document.getElementById('useBtn').disabled = !res.found;
            calcTotalRange('use'); // 偵測到類型後重算一次
        }

        async function useGift(confirmed) {
            document.getElementById('useBtn').innerText = "處理中...";
            const codes = (document.getElementById('useMode').value === 'list') ? document.getElementById('useCodes').value.trim().split('\n') : Array.from({length: parseInt(document.getElementById('useEnd').value) - parseInt(document.getElementById('useStart').value) + 1}, (_, i) => (parseInt(document.getElementById('useStart').value) + i).toString());
            const processedCodes = codes.map(c => applySuffix(c, window.foundData.calcType));
            const response = await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', confirm: confirmed, Supplier: window.foundData.supplier, GiftName: window.foundData.gift, payload: processedCodes.map(c => ({Code: c, OrderNo: document.getElementById('orderNo').value}))}) });
            const res = await response.json();
            document.getElementById('useBtn').innerText = "確認批量使用";
            if (res.result === "error") alert("警告：\n" + res.message);
            else if (res.result === "confirm") { if(confirm(res.message)) useGift(true); }
            else { alert("處理完成！"); document.getElementById('useBtn').disabled = true; }
        }
        
        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>

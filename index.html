<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .sub-tab-btn { padding: 8px 15px; cursor: pointer; background: #e7e7e7; border: 1px solid #ccc; margin-right: 5px; }
        .sub-tab-btn.active { background: #008CBA; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select, textarea { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        td input { width: 100%; padding: 4px; border: none; background: transparent; }
        td input:disabled { background: #eee; }
        .edit-btn { background: #ff9500; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .save-btn { background: #28a745; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .del-btn { background: #ff3b30; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        .log-section { display: none; background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-top: 15px; }
        .log-section.active { display: block; }
        .refresh-btn { padding: 10px 15px; background: #007bc2; color: white; border: none; cursor: pointer; height: 42px; align-self: center; margin-bottom: 20px;}
    </style>
</head>
<body>
    <!-- 主功能選單按鈕 -->
    <button id="btn-register" class="tab-btn active" onclick="showTab('register')">禮券登記</button>
    <button id="btn-use" class="tab-btn" onclick="showTab('use')">禮券使用</button>
    <button id="btn-logs" class="tab-btn" onclick="showTab('logs')">流水帳記錄</button>

    <div id="register" class="content active">
        <h2>禮券登記 (Batch: <span id="batchDisplay">讀取中...</span>)</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <select id="regMode" onchange="toggleMode('reg', this.value)">
            <option value="list">清單輸入</option>
            <option value="range" selected>範圍輸入</option>
        </select>
        <div id="regList" style="display:none;">
            <textarea id="regCodes" oninput="calcTotal('regCodes', 'regTotal')"></textarea>
        </div>
        <div id="regRange">
            <input type="text" id="regStart" placeholder="起始" oninput="calcTotalRange('reg')">
            <input type="text" id="regEnd" placeholder="結束" oninput="calcTotalRange('reg')">
        </div>
        <h3 id="regTotal">總張數: 0</h3>
        <button id="regBtn" onclick="register(false)">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <select id="useMode" onchange="toggleMode('use', this.value)">
            <option value="list">清單輸入</option>
            <option value="range" selected>範圍輸入</option>
        </select>
        <div id="useList" style="display:none;">
            <textarea id="useCodes" oninput="handleSingleCheck(this.value); calcTotal('useCodes', 'useTotal')"></textarea>
        </div>
        <div id="useRange">
            <input type="text" id="useStart" oninput="handleSingleCheck(this.value); calcTotalRange('use')">
            <input type="text" id="useEnd" oninput="handleSingleCheck(this.value); calcTotalRange('use')">
        </div>
        <h3 id="useTotal">總張數: 0</h3>
        <h3 id="useInfoDisplay">請輸入編號...</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift(false)" disabled>確認批量使用</button>
    </div>

    <div id="logs" class="content">
        <h2>流水帳記錄</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
            <input type="text" id="filterOrder" placeholder="篩選單號" oninput="renderLogs()" style="margin: 0;">
            <input type="date" id="filterDate" oninput="renderLogs()" style="margin: 0;">
            <input type="text" id="filterUser" placeholder="篩選人員" oninput="renderLogs()" style="margin: 0;">
            <button id="manualRefreshBtn" class="refresh-btn" onclick="refreshLogsHand(this)" style="margin: 0;">重新整理</button>
        </div>

        <!-- 選擇 流水帳子記錄 的按鈕 -->
        <div style="margin-bottom: 15px;">
            <button id="sub-btn-reg" class="sub-tab-btn active" onclick="showSubLog('reg')">禮券登記記錄</button>
            <button id="sub-btn-use" class="sub-tab-btn" onclick="showSubLog('use')">禮券使用記錄</button>
        </div>

        <!-- 禮券登記記錄區塊 -->
        <div id="log-section-reg" class="log-section active">
            <h3>禮券登記記錄 (按每次確認顯示)</h3>
            <table>
                <thead>
                    <tr>
                        <th>清單/範圍</th><th>Code 範圍/內容</th><th>總張數</th><th>供應商</th><th>項目</th><th>登記時間</th>
                    </tr>
                </thead>
                <tbody id="regLogBody"></tbody>
            </table>
        </div>

        <!-- 禮券使用記錄區塊 -->
        <div id="log-section-use" class="log-section">
            <h3>禮券使用記錄 (按每次確認顯示)</h3>
            <table>
                <thead>
                    <tr>
                        <th>清單/範圍</th><th>Code 範圍/內容</th><th>總張數</th><th>供應商</th><th>項目</th><th>單號</th><th>時間</th><th>單號2</th><th>時間2</th>
                    </tr>
                </thead>
                <tbody id="useLogBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz8jMVaJLH03E9ORniS8xEY_q_kJDq5mYbJ1H-XbKhclJphSfCn48IGBZDIybM9q-heVw/exec";
        let configData, currentBatch, allLogs = [];

        window.onload = async function() {
            var res = await (await fetch(API_URL)).json();
            configData = res.config;
            await refreshBatchDisplay();
            [...new Set(configData.map(function(r) { return r[0]; }))].forEach(function(s) {
                var opt = document.createElement('option'); opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
            loadLogs();
        };

        async function refreshBatchDisplay() {
            currentBatch = await (await fetch(API_URL + "?action=getBatch")).text();
            document.getElementById('batchDisplay').innerText = currentBatch;
        }

        async function loadLogs() {
            allLogs = await (await fetch(API_URL + "?action=getLogs")).json();
            renderLogs();
        }

        async function refreshLogsHand(btn) {
            btn.innerText = "載入中...";
            btn.disabled = true;
            await refreshBatchDisplay();
            allLogs = await (await fetch(API_URL + "?action=getLogs")).json();
            renderLogs();
            btn.innerText = "重新整理";
            btn.disabled = false;
        }

        // 修正點：重構此功能，解決因為新登記項目沒有單號而被過濾掉的問題
        function renderLogs() {
            var fO = document.getElementById('filterOrder').value;
            var fD = document.getElementById('filterDate').value;
            var fU = document.getElementById('filterUser').value;

            // 第一步：先排除已刪除的資料，並篩選人員
            var baseLogs = allLogs.filter(function(l) {
                var passUser = !fU || (l.data[11] || "").toString().includes(fU);
                var isDeleted = l.data[12] === "已登記刪除";
                return passUser && !isDeleted;
            });

            // --- 1. 處理禮券登記記錄 ---
            var regGroups = {};
            baseLogs.forEach(function(l) {
                // 如果有輸入單號篩選，而登記資料無單號，則在登記記錄中不顯示該筆
                if (fO && !((l.data[7] || "").toString().includes(fO) || (l.data[9] || "").toString().includes(fO))) return;
                
                // 如果有日期篩選，比對 3:登記時間
                if (fD) {
                    var rDate = l.data[3] ? new Date(l.data[3]).toISOString().split('T')[0] : "";
                    if (rDate !== fD) return;
                }

                var batchId = l.data[0];
                if (!batchId) return;
                if (!regGroups[batchId]) {
                    regGroups[batchId] = { supplier: l.data[1], gift: l.data[2], codes: [], regTime: l.data[3] };
                }
                regGroups[batchId].codes.push(l.data[4].toString());
            });

            var regLogBody = document.getElementById('regLogBody');
            regLogBody.innerHTML = "";
            Object.keys(regGroups).sort((a,b)=>b-a).forEach(function(key) {
                var g = regGroups[key];
                var total = g.codes.length;
                g.codes.sort();
                var mode = "範圍";
                var codeStr = g.codes[0] + " ~ " + g.codes[total - 1];
                if (total === 1) codeStr = g.codes[0];
                
                var rTime = g.regTime ? new Date(g.regTime).toLocaleString() : "";
                
                var tr = document.createElement('tr');
                tr.innerHTML = "<td>" + mode + "</td>" +
                               "<td>" + codeStr + "</td>" +
                               "<td>" + total + "</td>" +
                               "<td>" + g.supplier + "</td>" +
                               "<td>" + g.gift + "</td>" +
                               "<td>" + rTime + "</td>";
                regLogBody.appendChild(tr);
            });

            // --- 2. 處理禮券使用記錄 ---
            var useGroups = {};
            baseLogs.forEach(function(l) {
                var useOrder = l.data[7];   
                var useTime = l.data[8];    
                var useOrder2 = l.data[9];  
                var useTime2 = l.data[10];  
                
                // 使用記錄必須符合已使用狀態與具備單號
                if (l.data[6] !== "已使用" || !useOrder) return; 
                
                // 單號篩選比對
                if (fO && !(useOrder.toString().includes(fO) || (useOrder2 || "").toString().includes(fO))) return;
                
                // 日期篩選比對使用時間或使用時間2
                if (fD) {
                    var logDate = useTime ? new Date(useTime).toISOString().split('T')[0] : "";
                    var logDate2 = useTime2 ? new Date(useTime2).toISOString().split('T')[0] : "";
                    if (logDate !== fD && logDate2 !== fD) return;
                }
                
                var groupKey = useOrder + "_" + useTime + "_" + (useOrder2 || "");
                if (!useGroups[groupKey]) {
                    useGroups[groupKey] = { 
                        supplier: l.data[1], 
                        gift: l.data[2], 
                        codes: [], 
                        orderNo: useOrder, 
                        time: useTime,
                        orderNo2: useOrder2,
                        time2: useTime2
                    };
                }
                useGroups[groupKey].codes.push(l.data[4].toString()); 
            });

            var useLogBody = document.getElementById('useLogBody');
            useLogBody.innerHTML = "";
            Object.keys(useGroups).forEach(function(key) {
                var g = useGroups[key];
                var total = g.codes.length;
                g.codes.sort();
                var mode = "範圍";
                var codeStr = g.codes[0] + " ~ " + g.codes[total - 1];
                if (total === 1) codeStr = g.codes[0];

                var t1 = g.time ? new Date(g.time).toLocaleString() : "";
                var t2 = g.time2 ? new Date(g.time2).toLocaleString() : "";

                var tr = document.createElement('tr');
                tr.innerHTML = "<td>" + mode + "</td>" +
                               "<td>" + codeStr + "</td>" +
                               "<td>" + total + "</td>" +
                               "<td>" + g.supplier + "</td>" +
                               "<td>" + g.gift + "</td>" +
                               "<td>" + g.orderNo + "</td>" +
                               "<td>" + t1 + "</td>" +
                               "<td>" + (g.orderNo2 || "") + "</td>" +
                               "<td>" + t2 + "</td>";
                useLogBody.appendChild(tr);
            });
        }

        function showTab(id) { 
            document.querySelectorAll('.content').forEach(function(c){ c.classList.remove('active'); }); 
            document.getElementById(id).classList.add('active'); 
            
            document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
            document.getElementById('btn-' + id).classList.add('active');
        }

        function showSubLog(type) {
            document.querySelectorAll('.log-section').forEach(function(s){ s.classList.remove('active'); });
            document.getElementById('log-section-' + type).classList.add('active');

            document.querySelectorAll('.sub-tab-btn').forEach(function(b){ b.classList.remove('active'); });
            document.getElementById('sub-btn-' + type).classList.add('active');
        }

        function toggleMode(p, m) { document.getElementById(p + 'List').style.display = (m === 'list') ? 'block' : 'none'; document.getElementById(p + 'Range').style.display = (m === 'range') ? 'block' : 'none'; }
        function applySuffixLogic(val, type) { var s = val.toString().trim(); if (type === "suffix_12") return s.slice(-12); if (type === "suffix_1") return s.slice(0, -1); if (type === "suffix_2") return s.slice(0, -2); return s; }
        function getRangeCodes(start, end) { var sVal = parseInt(start.slice(-12)), eVal = parseInt(end.slice(-12)), prefix = start.slice(0, -12); var codes = []; for (var i = sVal; i <= eVal; i++) { codes.push(prefix + i.toString().padStart(12, '0')); } return codes; }
        
        async function register(confirmed) { 
            var btn = document.getElementById('regBtn'); 
            btn.innerText = "處理中..."; 
            btn.disabled = true; 
            var s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value; 
            var codes = (document.getElementById('regMode').value === 'list') ? document.getElementById('regCodes').value.trim().split('\n') : getRangeCodes(document.getElementById('regStart').value.trim(), document.getElementById('regEnd').value.trim()); 
            
            var res = await (await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({
                    mode: 'register', 
                    confirm: confirmed,
                    payload: codes.map(function(c){ return {Batch: currentBatch, Supplier: s, GiftName: g, Code: c.toString()}; })
                }) 
            })).json(); 
            
            btn.innerText = "確認登記";
            btn.disabled = false;
            
            if (res.result === "confirm") {
                if (confirm(res.message)) {
                    register(true); 
                }
            } else if (res.result === "success") {
                alert("登記完成！成功新增 " + res.count + " 筆。"); 
                document.getElementById('regStart').value = "";
                document.getElementById('regEnd').value = "";
                document.getElementById('regCodes').value = "";
                document.getElementById('regTotal').innerText = "總張數: 0";
                await refreshBatchDisplay();
                loadLogs(); 
            } else {
                alert("錯誤: " + res.message);
            }
        }

        async function useGift(confirmed) { 
            var btn = document.getElementById('useBtn'); 
            btn.innerText = "處理中..."; 
            var s = document.getElementById('useStart').value.trim(), e = document.getElementById('useEnd').value.trim(); 
            var codes = (document.getElementById('useMode').value === 'list') ? document.getElementById('useCodes').value.trim().split('\n') : getRangeCodes(s, e); 
            
            var res = await (await fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({
                    mode: 'use', 
                    confirm: confirmed, 
                    Supplier: window.foundData.supplier, 
                    GiftName: window.foundData.gift, 
                    payload: codes.map(function(c){ return {Code: applySuffixLogic(c, window.foundData.calcType), OrderNo: document.getElementById('orderNo').value}; })
                }) 
            })).json(); 
            
            btn.innerText = "確認批量使用"; 
            if (res.result === "error") {
                alert(res.message); 
            } else if (res.result === "confirm") { 
                if(confirm(res.message)) useGift(true); 
            } else { 
                alert("處理完成！"); 
                document.getElementById('useStart').value = "";
                document.getElementById('useEnd').value = "";
                document.getElementById('useCodes').value = "";
                document.getElementById('orderNo').value = "";
                document.getElementById('useTotal').innerText = "總張數: 0";
                document.getElementById('useInfoDisplay').innerText = "請輸入編號...";
                document.getElementById('useBtn').disabled = true;
                loadLogs(); 
            } 
        }

        function calcTotal(id, target) { document.getElementById(target).innerText = "總張數: " + document.getElementById(id).value.trim().split('\n').filter(Boolean).length; }
        function calcTotalRange(p) { var s = document.getElementById(p + 'Start').value.trim(), e = document.getElementById(p + 'End').value.trim(); var type = (window.foundData && window.foundData.calcType) ? window.foundData.calcType : null; var sV = parseInt(applySuffixLogic(s, type)), eV = parseInt(applySuffixLogic(e, type)); document.getElementById(p + 'Total').innerText = "總張數: " + (sV && eV ? (eV - sV + 1) : 0); }
        
        function handleSingleCheck(val) { 
            var code = document.getElementById('useMode').value === 'list' ? val.trim().split('\n')[0] : document.getElementById('useStart').value.trim(); 
            if(!code) return; 
            fetch(API_URL + "?action=find&code=" + encodeURIComponent(code)).then(function(r){ return r.json(); }).then(function(res){ 
                window.foundData = res; 
                if (res.found) {
                    var statusText = res.used === "已使用" ? " ⚠️ 該券狀態：已使用過！" : " (未使用)";
                    document.getElementById('useInfoDisplay').innerText = "偵測到：" + res.supplier + " - " + res.gift + statusText; 
                } else {
                    document.getElementById('useInfoDisplay').innerText = "找不到"; 
                }
                document.getElementById('useBtn').disabled = !res.found; 
                calcTotalRange('use'); 
            }); 
        }
        
        function updateGiftMenu() { var s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect'); g.innerHTML = ""; configData.filter(function(r){ return r[0] === s; }).forEach(function(r){ var opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); }); }
    </script>
</body>
</html>

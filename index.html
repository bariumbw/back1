<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <style>
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <button onclick="showTab('reg')">禮券登記</button>
    <button onclick="showTab('use')">禮券使用</button>

    <div id="reg" class="tab-content active">
        <h2>禮券登記 (Batch: <span id="batch"></span>)</h2>
        <select id="sup"></select><select id="gift"></select>
        <input type="number" id="regStart" oninput="calc()">
        <input type="number" id="regEnd" oninput="calc()">
        <h3 id="regCount">總張數: 0</h3>
        <button onclick="submitReg()">確認登記</button>
    </div>

    <div id="use" class="tab-content">
        <h2>禮券使用</h2>
        <input type="number" id="useStart" oninput="check(this.value); calcUse()">
        <input type="number" id="useEnd" oninput="calcUse()">
        <h3 id="useCount">總張數: 0</h3>
        <h3 id="info">請輸入編號...</h3>
        <input type="text" id="orderNo">
        <button id="useBtn" onclick="submitUse()" disabled>確認批量使用</button>
    </div>

    <script>
        const url = "您的 Web App 網址";
        async function init() {
            let res = await (await fetch(url)).json();
            document.getElementById('batch').innerText = await (await fetch(url+"?action=getBatch")).text();
            res.config.forEach(r => {
                let opt = document.createElement('option'); opt.value = r[0]; opt.text = r[0];
                document.getElementById('sup').appendChild(opt);
            });
        }
        function calc() {
            let s = +document.getElementById('regStart').value, e = +document.getElementById('regEnd').value;
            document.getElementById('regCount').innerText = "總張數: " + (e >= s ? e - s + 1 : 0);
        }
        function calcUse() {
            let s = +document.getElementById('useStart').value, e = +document.getElementById('useEnd').value;
            document.getElementById('useCount').innerText = "總張數: " + (e >= s ? e - s + 1 : 0);
        }
        async function check(v) {
            let res = await (await fetch(url+"?action=find&code="+v)).json();
            window.found = res;
            document.getElementById('info').innerText = res.found ? "偵測到："+res.supplier : "找不到編號";
            document.getElementById('useBtn').disabled = !res.found;
        }
        async function submitReg() {
            let s = +document.getElementById('regStart').value, e = +document.getElementById('regEnd').value;
            let codes = Array.from({length: e-s+1}, (_,i) => (s+i).toString());
            await fetch(url, {method: "POST", body: JSON.stringify({mode: "register", payload: codes.map(c=>({Batch: document.getElementById('batch').innerText, Supplier: document.getElementById('sup').value, GiftName: document.getElementById('gift').value, Code: c}))})});
            location.reload();
        }
        async function submitUse() {
            let s = +document.getElementById('useStart').value, e = +document.getElementById('useEnd').value;
            let codes = Array.from({length: e-s+1}, (_,i) => (s+i).toString());
            await fetch(url, {method: "POST", body: JSON.stringify({mode: "use", Supplier: window.found.supplier, GiftName: window.found.gift, payload: codes.map(c=>({Code: c, OrderNo: document.getElementById('orderNo').value}))})});
            location.reload();
        }
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        init();
    </script>
</body>
</html>

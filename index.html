<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select, textarea { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <button class="tab-btn active" id="btnReg" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" id="btnUse" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記 (Batch: <span id="batchDisplay">讀取中...</span>)</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <select id="regMode" onchange="toggleMode('reg', this.value)">
            <option value="list">輸入清單</option>
            <option value="range">首尾碼範圍</option>
        </select>
        <div id="regList"><textarea id="regCodes" placeholder="每行一個"></textarea></div>
        <div id="regRange" style="display:none;">
            <input type="number" id="regStart" placeholder="起始">
            <input type="number" id="regEnd" placeholder="結束">
        </div>
        <button id="regBtn" onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <select id="useMode" onchange="toggleMode('use', this.value)">
            <option value="list">輸入清單</option>
            <option value="range">首尾碼範圍</option>
        </select>
        <div id="useList"><textarea id="useCodes" oninput="handleSingleCheck(this.value)"></textarea></div>
        <div id="useRange" style="display:none;">
            <input type="number" id="useStart" placeholder="起始" oninput="handleSingleCheck(this.value)">
            <input type="number" id="useEnd" placeholder="結束">
        </div>
        <h3 id="useInfoDisplay">請輸入編號...</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift()" disabled>確認批量使用</button>
    </div>

    <script>
        const API_URL = "在此貼上您的 Web App 部署網址";
        let configData, currentBatch;

        window.onload = async () => {
            const res = await (await fetch(API_URL)).json();
            configData = res.config;
            currentBatch = await (await fetch(API_URL + "?action=getBatch")).text();
            document.getElementById('batchDisplay').innerText = currentBatch;
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option'); opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
        };

        function toggleMode(prefix, mode) {
            document.getElementById(prefix + 'List').style.display = (mode === 'list') ? 'block' : 'none';
            document.getElementById(prefix + 'Range').style.display = (mode === 'range') ? 'block' : 'none';
        }

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => { let opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); });
        }

        async function register() {
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value;
            let codes = [];
            if(document.getElementById('regList').style.display !== 'none') {
                codes = document.getElementById('regCodes').value.trim().split('\n');
            } else {
                for(let i=parseInt(document.getElementById('regStart').value); i<=parseInt(document.getElementById('regEnd').value); i++) codes.push(i.toString());
            }
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'register', payload: codes.map(c => ({Batch: currentBatch, Supplier: s, GiftName: g, Code: c}))}) });
            alert("登記完成！");
            location.reload();
        }

        async function handleSingleCheck(val) {
            const code = document.getElementById('useMode').value === 'list' ? val.trim().split('\n')[0] : val;
            if(!code) return;
            const res = await (await fetch(`${API_URL}?action=find&code=${code}`)).json();
            window.foundData = res;
            document.getElementById('useInfoDisplay').innerText = res.found ? `偵測到：${res.supplier} - ${res.gift} (狀態: ${res.used})` : "找不到該編號";
            document.getElementById('useBtn').disabled = !res.found;
        }

        async function useGift() {
            const codes = (document.getElementById('useList').style.display !== 'none') ? document.getElementById('useCodes').value.trim().split('\n') : Array.from({length: parseInt(document.getElementById('useEnd').value) - parseInt(document.getElementById('useStart').value) + 1}, (_, i) => (parseInt(document.getElementById('useStart').value) + i).toString());
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Supplier: window.foundData.supplier, GiftName: window.foundData.gift, payload: codes.map(c => ({Code: c, OrderNo: document.getElementById('orderNo').value}))}) });
            alert("處理完成！");
            location.reload();
        }
        
        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>

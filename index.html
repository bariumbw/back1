<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>完整禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #eee; border: none; margin-right: 5px; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; border: 1px solid #ccc; }
        button { padding: 12px 24px; background-color: #4CAF50; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <button class="tab-btn active" id="btnReg" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" id="btnUse" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <input type="number" id="start" placeholder="起始編號">
        <input type="number" id="end" placeholder="結束編號">
        <button onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <input type="number" id="useCode" placeholder="掃描或輸入禮券編號" oninput="handleUseInput()">
        <h3 id="useInfoDisplay">請輸入編號...</h3>
        <input type="text" id="orderNo" placeholder="請填寫單號 (Order No.)">
        <button id="useBtn" onclick="useGift()" disabled>確認使用</button>
    </div>

    <script>
        const API_URL = "填入您的 API 網址";
        let configData, foundData;

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
        }

        window.onload = async () => {
            const res = await (await fetch(API_URL)).json();
            configData = res.config;
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option'); opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
        };

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => { let opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); });
        }

        async function register() {
            const start = parseInt(document.getElementById('start').value), end = parseInt(document.getElementById('end').value);
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value;
            let payload = [];
            for(let i = start; i <= end; i++) payload.push({Supplier: s, GiftName: g, Code: i});
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'register', payload: payload}) });
            alert("登記完成！");
        }

        async function handleUseInput() {
            const rawCode = document.getElementById('useCode').value;
            if(!rawCode) return;
            const res = await (await fetch(`${API_URL}?action=find&code=${rawCode}`)).json();
            foundData = res;
            if (!res.found) {
                document.getElementById('useInfoDisplay').innerText = "找不到該編號";
                document.getElementById('useBtn').disabled = true;
            } else {
                document.getElementById('useInfoDisplay').innerText = `偵測到：${res.supplier} - ${res.gift} (狀態: ${res.used})`;
                document.getElementById('useBtn').disabled = false;
            }
        }

        async function useGift() {
            const code = foundData.code;
            const orderNo = document.getElementById('orderNo').value;
            const check = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', checkOnly: true, Code: code, Supplier: foundData.supplier, GiftName: foundData.gift}) })).json();
            
            let isOverwrite = false;
            if (check.used === '已使用') {
                if (!confirm("此禮券已使用，是否覆蓋並記錄至單號2與時間2？")) return;
                isOverwrite = true;
            }

            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Code: code, OrderNo: orderNo, Supplier: foundData.supplier, GiftName: foundData.gift, isOverwrite: isOverwrite}) });
            alert("處理完成！");
            
            // 清空並保持頁面
            document.getElementById('useCode').value = "";
            document.getElementById('orderNo').value = "";
            document.getElementById('useBtn').disabled = true;
            document.getElementById('useInfoDisplay').innerText = "請輸入編號...";
        }
    </script>
</body>
</html>

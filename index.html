<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select, textarea { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <button class="tab-btn active" id="btnReg" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" id="btnUse" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記</h2>
        <input type="number" id="batchInput" placeholder="批次編號 (Batch)">
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <textarea id="regCodes" placeholder="輸入編號，每行一個" oninput="calcTotal('regCodes', 'totalReg')"></textarea>
        <h3 id="totalReg">總張數: 0</h3>
        <button id="regBtn" onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <select id="modeSelect" onchange="toggleUseMode()">
            <option value="list">1. 輸入編號 (每行一個)</option>
            <option value="range">2. 首尾碼編號 (連續範圍)</option>
        </select>

        <div id="modeList">
            <textarea id="useCodes" placeholder="輸入禮券編號，每行一個" oninput="handleSingleCheck(this.value); calcTotal('useCodes', 'totalUse')"></textarea>
        </div>

        <div id="modeRange" style="display:none;">
            <input type="number" id="useStart" placeholder="起始編號" oninput="handleSingleCheck(this.value); calcTotalRange()">
            <input type="number" id="useEnd" placeholder="結束編號" oninput="calcTotalRange()">
        </div>

        <h3 id="useInfoDisplay">請輸入編號...</h3>
        <h3 id="totalUse">總張數: 0</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift()" disabled>確認批量使用</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz8jMVaJLH03E9ORniS8xEY_q_kJDq5mYbJ1H-XbKhclJphSfCn48IGBZDIybM9q-heVw/exec"; // 請填入
        let foundData;

        // 計算總張數 (清單模式)
        function calcTotal(id, target) {
            const val = document.getElementById(id).value.trim();
            const count = val ? val.split('\n').filter(line => line.trim() !== "").length : 0;
            document.getElementById(target).innerText = "總張數: " + count;
        }

        // 計算總張數 (範圍模式)
        function calcTotalRange() {
            const start = parseInt(document.getElementById('useStart').value);
            const end = parseInt(document.getElementById('useEnd').value);
            const total = (end >= start) ? (end - start + 1) : 0;
            document.getElementById('totalUse').innerText = "總張數: " + (isNaN(total) || total < 0 ? 0 : total);
        }

        // 切換使用模式
        function toggleUseMode() {
            const mode = document.getElementById('modeSelect').value;
            document.getElementById('modeList').style.display = (mode === 'list') ? 'block' : 'none';
            document.getElementById('modeRange').style.display = (mode === 'range') ? 'block' : 'none';
            document.getElementById('totalUse').innerText = "總張數: 0";
            document.getElementById('useBtn').disabled = true;
            document.getElementById('useInfoDisplay').innerText = "請輸入編號...";
        }

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
        }

        // 檢查單一編號 (用來啟用按鈕)
        async function handleSingleCheck(val) {
            let code = "";
            if (document.getElementById('modeSelect').value === 'list') {
                code = val.trim().split('\n')[0];
            } else {
                code = val;
            }
            if (!code) return;
            const res = await (await fetch(`${API_URL}?action=find&code=${code}`)).json();
            foundData = res;
            document.getElementById('useInfoDisplay').innerText = res.found ? `偵測到：${res.supplier} - ${res.gift} (狀態: ${res.used})` : "找不到該編號";
            document.getElementById('useBtn').disabled = !res.found;
        }

        // 執行批量使用
        async function useGift() {
            const btn = document.getElementById('useBtn');
            const mode = document.getElementById('modeSelect').value;
            let codes = [];

            if (mode === 'list') {
                codes = document.getElementById('useCodes').value.trim().split('\n').filter(c => c.trim() !== "");
            } else {
                const start = parseInt(document.getElementById('useStart').value);
                const end = parseInt(document.getElementById('useEnd').value);
                for(let i = start; i <= end; i++) codes.push(i.toString());
            }

            btn.innerText = "處理中..."; btn.disabled = true;
            try {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({
                    mode: 'use', Supplier: foundData.supplier, GiftName: foundData.gift,
                    payload: codes.map(c => ({Code: c.trim(), OrderNo: document.getElementById('orderNo').value}))
                })});
                alert("處理完成！");
                document.getElementById('useCodes').value = "";
                document.getElementById('useStart').value = "";
                document.getElementById('useEnd').value = "";
                document.getElementById('totalUse').innerText = "總張數: 0";
            } finally {
                btn.innerText = "確認批量使用"; btn.disabled = false;
            }
        }

        // 初始化選單
        window.onload = async () => {
            const res = await (await fetch(API_URL)).json();
            const configData = res.config;
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option'); opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
        };

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect');
            g.innerHTML = "";
            const configData = window.configData || []; // 需確保 configData 全域可存取
            configData.filter(r => r[0] === s).forEach(r => { let opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); });
        }
    </script>
</body>
</html>

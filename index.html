<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; margin-top: 20px; }
        .content.active { display: block; }
        input, select { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <button class="tab-btn active" id="btnReg" onclick="showTab('register')">禮券登記</button>
    <button class="tab-btn" id="btnUse" onclick="showTab('use')">禮券使用</button>

    <div id="register" class="content active">
        <h2>禮券登記</h2>
        <select id="supplierSelect" onchange="updateGiftMenu()"></select>
        <select id="giftSelect"></select>
        <input type="number" id="start" placeholder="起始編號" oninput="calcTotal('start', 'end', 'totalReg')">
        <input type="number" id="end" placeholder="結束編號" oninput="calcTotal('start', 'end', 'totalReg')">
        <h3 id="totalReg">總張數: 0</h3>
        <button onclick="register()">確認登記</button>
    </div>

    <div id="use" class="content">
        <h2>禮券使用</h2>
        <input type="number" id="useStart" placeholder="起始編號" oninput="handleUseInput(); calcTotal('useStart', 'useEnd', 'totalUse')">
        <input type="number" id="useEnd" placeholder="結束編號" oninput="calcTotal('useStart', 'useEnd', 'totalUse')">
        <h3 id="useInfoDisplay">請輸入起始編號...</h3>
        <h3 id="totalUse">總張數: 0</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift()" disabled>確認批量使用</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz8jMVaJLH03E9ORniS8xEY_q_kJDq5mYbJ1H-XbKhclJphSfCn48IGBZDIybM9q-heVw/exec";
        let configData, foundData;

        function calcTotal(s, e, d) {
            let start = parseInt(document.getElementById(s).value);
            let end = parseInt(document.getElementById(e).value);
            let total = (end >= start) ? (end - start + 1) : 0;
            document.getElementById(d).innerText = "總張數: " + (isNaN(total) ? 0 : total);
        }

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.add('active');
        }

        window.onload = async () => {
            const res = await (await fetch(API_URL)).json();
            configData = res.config;
            [...new Set(configData.map(r => r[0]))].forEach(s => {
                let opt = document.createElement('option'); opt.value = s; opt.text = s;
                document.getElementById('supplierSelect').appendChild(opt);
            });
            updateGiftMenu();
        };

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => { let opt = document.createElement('option'); opt.value = r[1]; opt.text = r[1]; g.appendChild(opt); });
        }

        async function register() {
            const start = parseInt(document.getElementById('start').value), end = parseInt(document.getElementById('end').value);
            const s = document.getElementById('supplierSelect').value, g = document.getElementById('giftSelect').value;
            let payload = [];
            for(let i = start; i <= end; i++) payload.push({Supplier: s, GiftName: g, Code: i});
            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'register', payload: payload}) });
            alert("登記完成！");
        }

        async function handleUseInput() {
            const val = document.getElementById('useStart').value;
            if(!val) return;
            const res = await (await fetch(`${API_URL}?action=find&code=${val}`)).json();
            foundData = res;
            if (!res.found) {
                document.getElementById('useInfoDisplay').innerText = "找不到該編號";
                document.getElementById('useBtn').disabled = true;
            } else {
                document.getElementById('useInfoDisplay').innerText = `偵測到：${res.supplier} - ${res.gift} (狀態: ${res.used})`;
                document.getElementById('useBtn').disabled = false;
            }
        }

        async function useGift() {
            const start = parseInt(document.getElementById('useStart').value), end = parseInt(document.getElementById('useEnd').value);
            let dups = [], notFound = [];
            for(let i = start; i <= end; i++) {
                let res = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', checkOnly: true, Code: i, Supplier: foundData.supplier, GiftName: foundData.gift}) })).json();
                if(res.status === 'not_found') notFound.push(i);
                else if(res.used === '已使用') dups.push(i);
            }
            if(notFound.length > 0) { alert("未登記號碼：\n" + notFound.join(", ")); return; }
            let isOverwrite = false;
            if(dups.length > 0 && !confirm("已使用號碼：\n" + dups.join(", ") + "\n是否覆蓋並記錄？")) return;
            else if(dups.length > 0) isOverwrite = true;
            for(let i = start; i <= end; i++) {
                await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Code: i, OrderNo: document.getElementById('orderNo').value, Supplier: foundData.supplier, GiftName: foundData.gift, isOverwrite: (isOverwrite && dups.includes(i))}) });
            }
            alert("處理完成！");
            document.getElementById('useStart').value = "";
            document.getElementById('useEnd').value = "";
            document.getElementById('orderNo').value = "";
            document.getElementById('totalUse').innerText = "總張數: 0";
            document.getElementById('useBtn').disabled = true;
            document.getElementById('useInfoDisplay').innerText = "請輸入起始編號...";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>禮券登記系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        select, input { padding: 10px; margin: 5px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background-color: #4CAF50; color: white; border: none; cursor: pointer; width: 300px; }
    </style>
</head>
<body>
    <h2>禮券登記系統</h2>
    <select id="supplierSelect" onchange="updateGiftMenu()"></select>
    <select id="giftSelect"></select>
    <input type="number" id="start" placeholder="起始編號" oninput="calcTotal()">
    <input type="number" id="end" placeholder="結束編號" oninput="calcTotal()">
    <h3 id="totalDisplay">總張數: 0</h3>
    <h3 id="batchDisplay">本次登記批次: 讀取中...</h3>
    <button id="submitBtn" onclick="register()">確認登記</button>

    <script>
        const API_URL = "填入您的 API 網址"; 
        let configData, currentBatch;

        window.onload = async () => {
            const res = await fetch(API_URL);
            const result = await res.json();
            configData = result.config;
            currentBatch = result.batch;
            document.getElementById('batchDisplay').innerText = "本次登記批次: " + currentBatch;
            const suppliers = [...new Set(configData.map(r => r[0]))];
            suppliers.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s; opt.text = s;
                supplierSelect.appendChild(opt);
            });
            updateGiftMenu();
        };

        function updateGiftMenu() {
            const s = document.getElementById('supplierSelect').value;
            const g = document.getElementById('giftSelect');
            g.innerHTML = "";
            configData.filter(r => r[0] === s).forEach(r => {
                let opt = document.createElement('option');
                opt.value = r[1]; opt.text = r[1];
                g.appendChild(opt);
            });
        }

        function calcTotal() {
            const s = parseInt(document.getElementById('start').value);
            const e = parseInt(document.getElementById('end').value);
            document.getElementById('totalDisplay').innerText = "總張數: " + (e - s + 1 || 0);
        }

        async function register() {
            const btn = document.getElementById('submitBtn');
            const start = parseInt(document.getElementById('start').value);
            const end = parseInt(document.getElementById('end').value);
            const supplier = document.getElementById('supplierSelect').value;
            const gift = document.getElementById('giftSelect').value;

            // 1. 檢查重複
            const res = await fetch(`${API_URL}?action=check&supplier=${encodeURIComponent(supplier)}&gift=${encodeURIComponent(gift)}`);
            const existing = await res.json();
            let dups = [];
            for(let i = start; i <= end; i++) { if(existing.includes(i)) dups.push(i); }
            
            if(dups.length > 0) { alert("編號重複：" + dups.join(", ")); return; }

            // 2. 送出
            btn.disabled = true;
            let payload = [];
            for(let i = start; i <= end; i++) payload.push({Batch: currentBatch, Supplier: supplier, GiftName: gift, Code: i});
            await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            alert("登記完成！");
            location.reload();
        }
    </script>
</body>
</html>

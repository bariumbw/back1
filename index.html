<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>禮券管理系統</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-btn { padding: 10px; cursor: pointer; background: #eee; border: none; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .content { display: none; } .content.active { display: block; }
        input { padding: 10px; margin: 10px 0; width: 100%; max-width: 300px; display: block; }
        button { padding: 12px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <button class="tab-btn active" id="btnUse" onclick="showTab('use')">禮券使用</button>

    <div id="use" class="content active">
        <h2>禮券使用</h2>
        <input type="number" id="useStart" placeholder="禮券編號" oninput="handleUseInput()">
        <h3 id="useInfoDisplay">請輸入編號...</h3>
        <input type="text" id="orderNo" placeholder="單號">
        <button id="useBtn" onclick="useGift()" disabled>確認使用</button>
    </div>

    <script>
        const API_URL = "填入您的網址";
        let foundData;

        function showTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function handleUseInput() {
            const rawCode = document.getElementById('useStart').value;
            const res = await (await fetch(`${API_URL}?action=find&code=${rawCode}`)).json();
            foundData = res;
            
            if (!res.found) {
                document.getElementById('useInfoDisplay').innerText = "找不到該編號";
                document.getElementById('useBtn').disabled = true;
            } else {
                document.getElementById('useInfoDisplay').innerText = `偵測到：${res.supplier} - ${res.gift} (狀態: ${res.used})`;
                document.getElementById('useBtn').disabled = false;
            }
        }

        async function useGift() {
            const code = document.getElementById('useStart').value;
            const orderNo = document.getElementById('orderNo').value;
            
            const check = await (await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', checkOnly: true, Code: code, Supplier: foundData.supplier, GiftName: foundData.gift}) })).json();
            
            let isOverwrite = false;
            if (check.used === '已使用') {
                if (!confirm("此禮券已使用，是否覆蓋並記錄？")) return;
                isOverwrite = true;
            }

            await fetch(API_URL, { method: "POST", body: JSON.stringify({mode: 'use', Code: code, OrderNo: orderNo, Supplier: foundData.supplier, GiftName: foundData.gift, isOverwrite: isOverwrite}) });
            
            alert("處理完成！");
            // 重置介面但不刷新頁面
            document.getElementById('useStart').value = "";
            document.getElementById('orderNo').value = "";
            document.getElementById('useInfoDisplay').innerText = "請輸入編號...";
            document.getElementById('useBtn').disabled = true;
        }
    </script>
</body>
</html>
